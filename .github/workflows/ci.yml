name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (no DB required) ────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        working-directory: ./backend
        run: chmod +x gradlew
      - name: Run unit tests
        working-directory: ./backend
        # excludeTags("schema-validation") is set in build.gradle.kts, so
        # SchemaValidationTest (which needs SQL Server) is skipped here.
        run: ./gradlew test

  # ── Schema validation (real SQL Server container) ─────────────────────────
  # Runs Flyway migrations against a fresh SQL Server instance, then boots the
  # full Spring context so Hibernate can validate every entity column mapping.
  # Catches migration-to-entity type mismatches on PRs, not just at deploy time.
  schema-validate:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "AltarWedCI@2024"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P AltarWedCI@2024 -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Build backend (compile only, no tests)
        working-directory: ./backend
        run: ./gradlew build -x test

      - name: Install sqlcmd and create test database
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq mssql-tools18 unixodbc-dev
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost,1433 -U sa -P "AltarWedCI@2024" \
            -Q "CREATE DATABASE altarwed" -No

      - name: Schema validation test (Flyway + Hibernate vs real SQL Server)
        working-directory: ./backend
        run: ./gradlew schemaValidationTest

  # ── Frontend builds ────────────────────────────────────────────────────────
  frontend-public-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build frontend-public
        working-directory: ./frontend-public
        run: |
          npm install
          npm run build

  frontend-app-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build frontend-app
        working-directory: ./frontend-app
        run: |
          npm install
          npm run build
