name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (no DB required) ────────────────────────────────────────────
  # excludeTags("schema-validation") is set in build.gradle.kts, so
  # SchemaValidationTest (which requires SQL Server) is excluded here.
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Make gradlew executable
        working-directory: ./backend
        run: chmod +x gradlew
      - name: Run unit tests
        working-directory: ./backend
        run: ./gradlew test

  # ── Schema validation (real SQL Server container) ─────────────────────────
  # Boots the full Spring context: Flyway applies every migration, Hibernate
  # validates every entity column. Catches migration-to-entity type mismatches
  # on PRs, not just at deploy time.
  schema-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "AltarWedCI@2024"
        ports:
          - 1433:1433
        options: >-
          --name mssql-ci
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P AltarWedCI@2024 -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Create test database
        run: |
          docker exec mssql-ci \
            /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "AltarWedCI@2024" \
            -Q "CREATE DATABASE altarwed" -No

      # Gradle resolves schemaValidationTest's compile dependencies itself —
      # no separate build step needed in this job.
      - name: Schema validation test (Flyway + Hibernate vs real SQL Server)
        working-directory: ./backend
        run: ./gradlew schemaValidationTest

  # ── Frontend builds ────────────────────────────────────────────────────────
  frontend-public-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build frontend-public
        working-directory: ./frontend-public
        run: |
          npm install
          npm run build

  frontend-app-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build frontend-app
        working-directory: ./frontend-app
        run: |
          npm install
          npm run build
