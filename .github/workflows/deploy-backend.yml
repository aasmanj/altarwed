name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# Serialize deploys to the single prod App Service. Two merges to main seconds
# apart (PR #16 and #17 on 2026-06-24) launched two parallel deploys that both
# OneDeploy'd app.jar to the same instance; the loser's commit silently never
# went live and its smoke test timed out. A static concurrency group forces runs
# to queue instead of race. cancel-in-progress: false so an in-flight deploy is
# never killed mid-upload (which could leave a half-written app.jar); GitHub keeps
# only the newest queued run (a superseded queued run is canceled and its smoke
# test never runs), so we always converge on and verify the latest commit.
concurrency:
  group: deploy-backend-prod
  cancel-in-progress: false

jobs:
  # ── Job 0 ─────────────────────────────────────────────────────────────────
  # Sub-second filename sanity: duplicate Flyway versions, gaps, malformed
  # names. Runs before the SQL Server container spins up so a busted rename
  # fails in seconds with a precise message instead of a generic boot error.
  # ──────────────────────────────────────────────────────────────────────────
  migration-filenames:
    runs-on: ubuntu-latest
    name: Validate Flyway migration filenames
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - run: bash backend/scripts/check-migrations.sh

  # ── Job 1 ─────────────────────────────────────────────────────────────────
  # Build the JAR, run Flyway migrations against a real SQL Server container,
  # then let Hibernate validate every entity column. A type mismatch between a
  # migration and a JPA entity fails here, nothing reaches Azure.
  # ──────────────────────────────────────────────────────────────────────────
  build-and-validate:
    needs: migration-filenames
    runs-on: ubuntu-latest
    name: Build JAR and validate DB schema
    timeout-minutes: 15

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "AltarWedCI@2024"
        ports:
          - 1433:1433
        # --name gives the container a stable handle so docker exec is unambiguous.
        # Health check uses sqlcmd that ships inside the image, no host install needed.
        options: >-
          --name mssql-ci
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P AltarWedCI@2024 -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x backend/gradlew

      # Stamp the exact commit SHA into the jar. Spring Boot's
      # ProjectInfoAutoConfiguration auto-loads classpath:git.properties into a
      # GitProperties bean and exposes it at /actuator/info. The post-deploy smoke
      # test polls that endpoint to confirm the NEW container is running before it
      # probes, because Azure reports deploy-success on jar UPLOAD, not on the
      # container swap that follows minutes later.
      - name: Stamp git.properties with deploy commit
        working-directory: backend
        run: |
          printf 'git.commit.id=%s\ngit.commit.id.abbrev=%s\ngit.branch=%s\ngit.build.time=%s\n' \
            "${{ github.sha }}" \
            "${GITHUB_SHA:0:7}" \
            "${{ github.ref_name }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > src/main/resources/git.properties
          echo "Wrote git.properties:"
          cat src/main/resources/git.properties

      - name: Build JAR
        working-directory: backend
        run: ./gradlew build -x test

      # The SQL Server image ships sqlcmd at /opt/mssql-tools18/bin/sqlcmd.
      # docker exec reaches it directly, no host-side mssql-tools installation,
      # no GPG key juggling, no apt-get. 30-60 seconds saved per run.
      # The service health check already guarantees SQL Server is ready before
      # step 1 runs, so no wait loop is needed here.
      - name: Create test database
        run: |
          docker exec mssql-ci \
            /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "AltarWedCI@2024" \
            -Q "CREATE DATABASE altarwed" -No

      - name: Schema validation test (Flyway + Hibernate vs real SQL Server)
        working-directory: backend
        # @ActiveProfiles("ci") on SchemaValidationTest activates application-ci.yml
        # (src/test/resources). No -D flag needed.
        run: ./gradlew schemaValidationTest

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          # Two-line exclusion: include all JARs, then negate the -plain.jar
          # (no embedded deps). @actions/glob treats leading ! as a negation.
          path: |
            backend/build/libs/*.jar
            !backend/build/libs/*-plain.jar
          retention-days: 1

  # ── Job 2 ─────────────────────────────────────────────────────────────────
  # Deploy the pre-validated JAR. Only runs when build-and-validate passes
  # schema mismatches block here and never reach Azure.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-validate
    runs-on: ubuntu-latest
    name: Deploy to Azure App Service
    timeout-minutes: 10

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: jar/

      # App Service (JAVA|21-java21, no startup command) looks for app.jar first.
      # Without this rename, Gradle's versioned JAR sits unused while the old
      # app.jar from a prior deploy keeps running. Rename here ensures every
      # deploy overwrites the file App Service actually boots.
      - name: Rename JAR to app.jar
        run: mv jar/*.jar jar/app.jar

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: altarwed-prod-api
          publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
          package: jar/

  # ── Job 3 ─────────────────────────────────────────────────────────────────
  # Step 1: SHA gate. Azure's webapps-deploy reports success when the jar
  # finishes UPLOADING, not when the new container is running, and the old
  # container keeps serving (and passing /actuator/health) for minutes after.
  # Polling health alone tested OLD code and produced false failures. So instead
  # poll /actuator/info until it reports the exact commit SHA we just deployed,
  # which only the NEW container returns. This also covers liveness: curl fails
  # until the app is reachable.
  #
  # Step 2: Probe one endpoint per controller family. Secured endpoints (no
  # token) must return 401/403 (mapped + secured); public endpoints must return
  # 200. 404 means the wrong app.jar is running; 5xx means a bean wiring failure.
  # Because step 1 guarantees the new code is live, these probes never race the
  # deploy swap.
  # ──────────────────────────────────────────────────────────────────────────
  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    name: Smoke test, verify Azure is healthy after deploy
    timeout-minutes: 15

    steps:
      - name: Wait for the deployed commit to go live
        run: |
          EXPECTED="${{ github.sha }}"
          # DeployInfoContributor exposes the full commit at /actuator/info under
          # deploy.commit (it reads the CI-stamped git.properties directly; Spring's
          # built-in git contributor renders empty under SB4). The 7-char short SHA
          # is a prefix of that full id, so a substring match is robust.
          SHORT="${EXPECTED:0:7}"
          INFO_URL="https://altarwed-prod-api.azurewebsites.net/actuator/info"
          echo "Waiting for commit $SHORT to go live at $INFO_URL ..."
          LIVE=0
          for i in $(seq 1 40); do
            BODY=$(curl -s --max-time 10 "$INFO_URL" || true)
            if echo "$BODY" | grep -q "$SHORT"; then
              echo "New code is live: commit $SHORT confirmed after ~$((i*15))s."
              LIVE=1
              break
            fi
            echo "Attempt $i/40: new commit not serving yet (got: $BODY), waiting 15s..."
            sleep 15
          done
          if [ "$LIVE" != "1" ]; then
            echo "ERROR: commit $SHORT did not go live within 10 minutes."
            echo "The jar uploaded but Azure never started the new container, or"
            echo "/actuator/info stopped exposing deploy.commit. Check App Service logs."
            exit 1
          fi

      - name: Verify controller registration (expect 4xx, not 404/500)
        # Calls each secured endpoint without a token and asserts the response
        # is a 4xx in the range 400-403, NOT 404 (unmapped) or 5xx (wiring
        # failure). Spring Security 6+ returns 401 or 403 depending on whether
        # the anonymous principal is treated as unauthenticated vs. unauthorised;
        # both are acceptable and both prove the controller is registered.
        # A 404 here means the wrong app.jar is still running.
        # A 5xx here means the controller mapped but a bean blew up at request time.
        run: |
          BASE="https://altarwed-prod-api.azurewebsites.net"
          FAIL=0

          check_secured() {
            local label="$1"
            local url="$2"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "PASS $label → HTTP $STATUS (controller registered, security active)"
            elif [ "$STATUS" = "404" ]; then
              echo "FAIL $label → HTTP 404 (endpoint not mapped, wrong app.jar?)"
              FAIL=1
            else
              echo "FAIL $label → HTTP $STATUS (unexpected, check container logs)"
              FAIL=1
            fi
          }

          check_public() {
            local label="$1"
            local url="$2"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$STATUS" = "200" ]; then
              echo "PASS $label → HTTP 200"
            else
              echo "FAIL $label → expected HTTP 200, got HTTP $STATUS"
              FAIL=1
            fi
          }

          # Secured endpoints: 401 or 403 both mean "mapped and secured"
          check_secured "google-sheets/status"   "$BASE/api/v1/integrations/google-sheets/status"
          check_secured "couples/me"             "$BASE/api/v1/couples/me"
          check_secured "wedding-websites/mine"  "$BASE/api/v1/wedding-websites/mine"
          check_secured "guests"                 "$BASE/api/v1/guests"

          # Public endpoints: must be 200
          check_public  "denominations"          "$BASE/api/v1/denominations"

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "ERROR: one or more controller probes failed."
            echo "404 → wrong app.jar still running; 5xx → bean wiring failure."
            echo "Check the rename step output and container logs."
            exit 1
          fi

          echo ""
          echo "All controller probes passed."
