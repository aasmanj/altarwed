name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  # ── Job 1 ─────────────────────────────────────────────────────────────────
  # Build the JAR, run Flyway migrations against a real SQL Server container,
  # then let Hibernate validate every entity column. A type mismatch between a
  # migration and a JPA entity fails here — nothing reaches Azure.
  # ──────────────────────────────────────────────────────────────────────────
  build-and-validate:
    runs-on: ubuntu-latest
    name: Build JAR and validate DB schema
    timeout-minutes: 15

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "AltarWedCI@2024"
        ports:
          - 1433:1433
        # --name gives the container a stable handle so docker exec is unambiguous.
        # Health check uses sqlcmd that ships inside the image — no host install needed.
        options: >-
          --name mssql-ci
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P AltarWedCI@2024 -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x backend/gradlew

      - name: Build JAR
        working-directory: backend
        run: ./gradlew build -x test

      # The SQL Server image ships sqlcmd at /opt/mssql-tools18/bin/sqlcmd.
      # docker exec reaches it directly — no host-side mssql-tools installation,
      # no GPG key juggling, no apt-get. 30-60 seconds saved per run.
      # The service health check already guarantees SQL Server is ready before
      # step 1 runs, so no wait loop is needed here.
      - name: Create test database
        run: |
          docker exec mssql-ci \
            /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "AltarWedCI@2024" \
            -Q "CREATE DATABASE altarwed" -No

      - name: Schema validation test (Flyway + Hibernate vs real SQL Server)
        working-directory: backend
        # @ActiveProfiles("ci") on SchemaValidationTest activates application-ci.yml
        # (src/test/resources). No -D flag needed.
        run: ./gradlew schemaValidationTest

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          # Two-line exclusion: include all JARs, then negate the -plain.jar
          # (no embedded deps). @actions/glob treats leading ! as a negation.
          path: |
            backend/build/libs/*.jar
            !backend/build/libs/*-plain.jar
          retention-days: 1

  # ── Job 2 ─────────────────────────────────────────────────────────────────
  # Deploy the pre-validated JAR. Only runs when build-and-validate passes —
  # schema mismatches block here and never reach Azure.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-validate
    runs-on: ubuntu-latest
    name: Deploy to Azure App Service
    timeout-minutes: 10

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: jar/

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: altarwed-prod-api
          publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
          package: jar/

  # ── Job 3 ─────────────────────────────────────────────────────────────────
  # Poll /actuator/health until UP (HTTP 200). Catches startup failures the
  # schema test cannot see: a missing Key Vault secret, a bad env var, OOM.
  # Fails the workflow (and notifies via GitHub) if the app isn't healthy
  # within 6 minutes of deployment completing.
  # ──────────────────────────────────────────────────────────────────────────
  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    name: Smoke test — verify Azure is healthy after deploy
    timeout-minutes: 10

    steps:
      - name: Wait for app to become healthy
        run: |
          URL="https://altarwed-prod-api.azurewebsites.net/actuator/health"
          echo "Polling $URL ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i/24: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy — deployment succeeded."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: app did not return HTTP 200 within 6 minutes."
          echo "Check Azure App Service logs for startup errors."
          exit 1
