name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'frontend-public/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  # Serialize deploys to the single prod Static Web App (the public SEO site). Same
  # concurrency race that hit deploy-app on 2026-06-26: two frontend-public/** merges
  # seconds apart would each fire a deploy at the same SWA environment, and Azure SWA
  # (one deploy per environment) would cancel the older in-flight run, failing it red.
  # This surface is the SEO/viral engine, so a flaky red deploy here is worse than on
  # the dashboard. cancel-in-progress: true (not false like deploy-backend) is safe:
  # SWA swaps the new bundle atomically only after a complete upload, so a superseded
  # run never half-deploys and the live site keeps serving the previous build until
  # the newest run finishes. Distinct group from deploy-app: a separate SWA resource.
  # Scoped to this job (not workflow-level) so it never governs close_pull_request.
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy Next.js to Azure Static Web Apps
    concurrency:
      group: deploy-landing-prod
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /frontend-public
          output_location: .next
        env:
          # Runtime env vars, set these in Azure SWA Application Settings too
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # NEXT_PUBLIC_ vars are baked into the JS bundle at build time
          NEXT_PUBLIC_FB_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_FB_PIXEL_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull request environment
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
