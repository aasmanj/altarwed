server:
  port: 8080
  # Drain in-flight requests on SIGTERM instead of dropping them. Ungraceful restarts
  # were tearing the container down mid-request, spraying NoClassDefFoundError across
  # Tomcat/Spring/JDBC and 504-ing the public wedding site during each ~30s boot window.
  # Graceful shutdown only engages on a clean SIGTERM (deploy, scale-in), NOT a SIGKILL
  # /OOM-kill. The platform must wait for the drain: WEBSITES_CONTAINER_STOP_TIME_LIMIT
  # in app-service.bicep is set above timeout-per-shutdown-phase below.
  shutdown: graceful

spring:
  application:
    name: altarwed-backend

  lifecycle:
    # Max time to let in-flight requests finish before the context forces shutdown.
    # Kept under the platform's container stop grace period so Spring drains first and
    # the platform does not SIGKILL mid-drain.
    timeout-per-shutdown-phase: 20s

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB

  # Virtual threads, uses Java 21 carrier threads for Tomcat and async tasks
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${AZURE_SQL_URL}
    username: ${AZURE_SQL_USERNAME}
    password: ${AZURE_SQL_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: 30000
      # Sized for Azure SQL Standard S2 (50 DTU, lower worker ceiling than S3).
      # Virtual threads are enabled, so the connection pool, not the thread count,
      # is the real DB concurrency gate. 20 per instance is conservative for S2 and
      # safely under its worker/session caps; bump alongside the SQL tier when the
      # DTU metric says so (per-instance pool x instance-count must stay under the cap).
      maximum-pool-size: 20
      minimum-idle: 5
      max-lifetime: 1800000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      # NEVER use create or update, Flyway owns the schema
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 6
    validate-on-migrate: true
    out-of-order: false

# JWT, secret and expiry pulled from environment / Azure Key Vault
altarwed:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  cookie:
    secure: ${COOKIE_SECURE:false}        # true in prod (HTTPS); false default keeps dev (HTTP) working
    same-site: ${COOKIE_SAME_SITE:Strict}

  redis:
    # Shared-state Redis for the per-IP rate limiter, the per-wedding RSVP search
    # throttle, and the Google OAuth CSRF state (issues #109/#414). Empty default:
    # while blank the app keeps today's in-memory, per-instance stores and boots with
    # zero Redis dependency (safe at App Service capacity 1; SharedStateStartupLogger
    # WARNs in prod). Set to the Azure Cache for Redis connection URL, e.g.
    # rediss://:{access-key}@{cache-name}.redis.cache.windows.net:6380/0, BEFORE
    # scaling capacity past 1 so limits and OAuth callbacks are cross-instance.
    url: ${REDIS_URL:}

  resend:
    # Empty default: a missing key disables email (degrades at runtime) instead of
    # crashing the JVM at startup before the health endpoint exists. StartupConfigValidator
    # logs a WARN at boot if this is blank in prod.
    api-key: ${RESEND_API_KEY:}
    from-email: ${RESEND_FROM_EMAIL:noreply@altarwed.com}
    # Separate sending identity for guest-facing bulk mail (save-the-dates, RSVP
    # invites). Isolating the invite stream on its own subdomain keeps a marketing
    # blast or a bounce on the root domain from tainting invite deliverability, and
    # lets us keep open/click tracking OFF on that subdomain (the strongest Gmail
    # "Promotions" signal), which is toggled in the Resend dashboard, not here.
    # Falls back to the main from-email so nothing changes
    # until RESEND_INVITES_FROM_EMAIL is set once the subdomain is verified in Resend.
    invites-from-email: ${RESEND_INVITES_FROM_EMAIL:${RESEND_FROM_EMAIL:noreply@altarwed.com}}
    # Max outbound sends/sec across ALL email types. Stays under Resend's 5 req/sec
    # account cap; raise alongside the Resend plan. Per-instance (see ResendEmailAdapter).
    rate-limit-per-second: ${RESEND_RATE_LIMIT_PER_SECOND:2}
    # Svix signing secret for the delivery webhook (whsec_...). No default: an empty
    # value rejects every webhook (ResendWebhookVerifier fails closed) so we never
    # trust an unsigned bounce, but its absence must not crash startup.
    webhook-secret: ${RESEND_WEBHOOK_SECRET:}

  app:
    base-url: ${APP_BASE_URL:https://app.altarwed.com}

  admin:
    emails: ${ADMIN_EMAILS:aasmanj@gmail.com}
    alert-email: ${ADMIN_ALERT_EMAIL:hello@altarwed.com}

  nextjs:
    base-url: ${NEXTJS_BASE_URL:https://www.altarwed.com}
    revalidation-secret: ${REVALIDATION_SECRET:}

  turnstile:
    # Cloudflare Turnstile secret key, guards the RSVP find-invitation endpoint against
    # scripted enumeration (issue #89). Blank is intentional OUTSIDE prod: with no secret
    # configured, CloudflareTurnstileAdapter verifies every request (captcha effectively
    # disabled) so local dev, CI, and any environment without a Cloudflare site yet keep
    # working. In the prod profile (fail-closed: true below) a blank secret instead rejects
    # every find-invitation request with a generic 503 and logs an ERROR at boot, so the
    # captcha can neither silently fail open (issues #220, #413) nor take the whole app down.
    # Set in Key Vault once the Turnstile site exists (issue #247).
    secret-key: ${TURNSTILE_SECRET_KEY:}
    # Profile-driven, deliberately NOT an env var (mirrors the springdoc prod toggle): only the
    # prod profile document flips it, so no deploy setting can accidentally fail dev open in
    # prod or fail CI closed.
    fail-closed: false

  google:
    # Empty defaults: a missing client id/secret disables Google Sheets sync (degrades at
    # runtime) instead of crashing startup. StartupConfigValidator WARNs at boot if blank.
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:https://altarwed-prod-api.azurewebsites.net/api/v1/integrations/google-sheets/callback}
    # Google Picker browser config. Empty defaults: a missing value degrades the
    # sheet-picker feature (frontend shows "not configured"), never crashes startup.
    # api-key = browser API key restricted to our referrers + Picker/Sheets APIs.
    # app-id  = numeric Cloud project number (ties Picker selections to our OAuth client).
    picker:
      api-key: ${GOOGLE_PICKER_API_KEY:}
      app-id: ${GOOGLE_PICKER_APP_ID:}
    # AES-256 key (base64, 32 bytes) that TokenEncryptionService uses to encrypt stored Google
    # OAuth access/refresh tokens at rest. No default: an empty value fails closed (encrypt/decrypt
    # throw rather than silently storing plaintext), same posture as unsubscribe.secret below.
    token-encryption-key: ${GOOGLE_OAUTH_TOKEN_ENCRYPTION_KEY:}

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    prices:
      pro-monthly: ${STRIPE_PRICE_PRO_MONTHLY:}
      pro-annual: ${STRIPE_PRICE_PRO_ANNUAL:}
      # Issue #370 pricing ladder: Premium tier price ids. Empty default = the Premium tier is
      # not offered: checkout rejects its price ids (fail closed) and the UI never renders the
      # tier. Deliberately NOT in StartupConfigValidator's missing-config WARN list: blank here
      # is the intentional "ladder rung not launched yet" state, not a misconfiguration.
      premium-monthly: ${STRIPE_PRICE_PREMIUM_MONTHLY:}
      premium-annual: ${STRIPE_PRICE_PREMIUM_ANNUAL:}

  pricing:
    # Monthly price (in cents) of a paid vendor plan, used only to compute the display-only
    # MRR figure on the founder /admin/metrics dashboard. Static config, intentionally NOT an
    # env var (no Bicep/Key Vault entry needed): it drives an internal estimate, not billing.
    # The source of truth for what vendors are actually charged is the Stripe price. Update this
    # literal if the real paid-plan monthly price changes.
    paid-plan-monthly-cents: 2900

  lob:
    api-key: ${LOB_API_KEY:}
    # Empty default: a missing secret disables webhook verification (fails closed, rejects every
    # event) instead of crashing the JVM at startup. Same reasoning as resend.webhook-secret.
    webhook-secret: ${LOB_WEBHOOK_SECRET:}

  vendor:
    # Comp promo code: a matching code grants a free, non-Stripe vendor listing (founder's friends
    # and first vendors). Not a secret; shared deliberately. Empty value disables redemption.
    # Override per-environment via VENDOR_PROMO_CODE; defaults to FREEVENDOR so it works out of the box.
    promo-code: ${VENDOR_PROMO_CODE:FREEVENDOR}
    # Founding vendor program: first N vendors to register get auto-verified for a free period.
    # Set founding-cap=0 to disable the program entirely.
    founding-cap: ${VENDOR_FOUNDING_CAP:25}
    founding-period-months: ${VENDOR_FOUNDING_PERIOD_MONTHS:12}

  unsubscribe:
    # No default: a missing secret produces broken unsubscribe links but must not crash the app.
    # Empty string causes HMAC to sign with a zero-length key (insecure but functional).
    secret: ${UNSUBSCRIBE_SECRET:}

  # No default: empty string omits the CAN-SPAM footer address (non-compliant but non-fatal).
  postal-address: ${POSTAL_ADDRESS:}

  api:
    base-url: ${API_BASE_URL:https://altarwed-prod-api.azurewebsites.net}

  meta:
    pixel-id: ${META_PIXEL_ID:}
    access-token: ${META_CAPI_ACCESS_TOKEN:}

  azure:
    storage:
      # Empty default: a missing connection string disables blob/media uploads (degrades at
      # runtime) instead of crashing startup. StartupConfigValidator WARNs at boot if blank.
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
      container-name: ${AZURE_STORAGE_CONTAINER_NAME:altarwed-media}
      public-base-url: ${BLOB_PUBLIC_BASE_URL:}

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

# Actuator, expose health and info; restrict others
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  # The deployed commit is exposed at /actuator/info under the `deploy` key by
  # DeployInfoContributor (reads the CI-stamped git.properties directly), which is
  # what the post-deploy smoke test gates on. Spring's built-in git contributor
  # renders empty under SB4, so we do not rely on it; this mode setting is left as
  # a harmless best-effort in case it starts populating.
  info:
    git:
      mode: full

---
# Local development profile, override with: -Dspring.profiles.active=local
# Create application-local.yml (gitignored) with real local values
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${LOCAL_SQL_URL:jdbc:sqlserver://localhost:1433;databaseName=altarwed;encrypt=false}
    username: ${LOCAL_SQL_USERNAME:sa}
    password: ${LOCAL_SQL_PASSWORD:Password123!}
  jpa:
    show-sql: true

springdoc:
  swagger-ui:
    enabled: true

---
# Production profile, activated by SPRING_PROFILES_ACTIVE=prod on Azure App Service
spring:
  config:
    activate:
      on-profile: prod

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

altarwed:
  turnstile:
    # Prod is the one environment where the RSVP captcha must never silently fail open (issues
    # #220, #413): with a blank secret the adapter rejects every anonymous find-invitation
    # request (generic 503) instead of verifying everything, and TurnstileStartupValidator
    # logs the unmet launch gate at ERROR on boot. The app itself still starts and serves
    # everything else.
    fail-closed: true
