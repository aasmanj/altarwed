# CI profile — activated by -Dspring.profiles.active=ci in GitHub Actions.
# Overrides every required env-var placeholder from application.yml so the
# Spring context boots cleanly against the SQL Server service container
# spun up by the workflow. No real credentials; throwaway container only.

spring:
  config:
    activate:
      on-profile: ci

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=altarwed;encrypt=false;trustServerCertificate=true
    username: sa
    password: "AltarWedCI@2024"
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Do NOT baseline in CI — start fresh and run every migration from V1.
    # Production uses baseline-on-migrate=true/version=6 because the schema
    # predated Flyway; the CI container is always empty so we run everything.
    baseline-on-migrate: false
    validate-on-migrate: true

altarwed:
  jwt:
    # Must be at least 32 ASCII chars (256 bits) for HMAC-SHA256.
    secret: "ci-schema-validation-placeholder-jwt-secret-not-real"
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000

  cors:
    allowed-origins: http://localhost:3000

  resend:
    api-key: "ci-placeholder"
    from-email: noreply@ci.test

  app:
    base-url: http://localhost:8080

  admin:
    emails: ci@test.test

  nextjs:
    base-url: http://localhost:3000
    revalidation-secret: "ci-placeholder"

  lob:
    api-key: ""

  azure:
    storage:
      # Azurite's well-known public dev key — safe for CI because the container
      # never connects to real Azure; blob operations are never called in a
      # context-load test.
      connection-string: "DefaultEndpointsProtocol=https;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;EndpointSuffix=core.windows.net"
      container-name: altarwed-media
