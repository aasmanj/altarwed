spring:
  datasource:
    url: jdbc:h2:mem:altarwed-test;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

altarwed:
  jwt:
    secret: test-secret-key-for-ci-minimum-32-characters-long
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000
  azure:
    storage:
      connection-string: DefaultEndpointsProtocol=https;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OT/Bx/cU6PF/S7T+UhXH3tRSBNkFMXDU4A==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1
      container-name: altarwed-media
